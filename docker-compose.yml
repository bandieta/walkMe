version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: walkme_postgres
    environment:
      POSTGRES_USER: walkme
      POSTGRES_PASSWORD: walkme_password
      POSTGRES_DB: walkme_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: walkme_redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: walkme_backend
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: walkme
      DB_PASSWORD: walkme_password
      DB_NAME: walkme_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
