name: Deploy

on:
  push:
    branches:
      - main       # → production
      - develop    # → staging
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never interrupt a deploy

jobs:
  deploy-backend:
    name: Deploy Backend (${{ github.ref_name == 'main' && 'production' || 'staging' }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        working-directory: backend
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: backend
        run: yarn build

      - name: Run migrations
        working-directory: backend
        env:
          NODE_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: yarn migration:run

      # Replace this step with your actual deployment method
      # (e.g., AWS ECS, Railway, Fly.io, Heroku, etc.)
      - name: Deploy to server
        env:
          DEPLOY_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          echo "Deploying backend to $DEPLOY_ENV environment"
          # Example: rsync dist/ to server or trigger a Docker pull
          # Customize this step for your infrastructure

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: failure()
    steps:
      - name: Post failure to Slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Deployment failed on *${{ github.ref_name }}* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true   # don't fail the job if Slack is unconfigured
